[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [
    "migrations",
    "__pycache__",
    ".venv",
    "venv",
]

[tool.ruff.lint]
select = ["E", "F", "W", "I", "DJ", "S"]
ignore = ["S101"]

[tool.ruff.lint.per-file-ignores]
"*/tests.py" = ["S101", "S106"]
"core/settings.py" = ["S105"]

[tool.ruff.lint.isort]
known-first-party = ["core", "users"]
